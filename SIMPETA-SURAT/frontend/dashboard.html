<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPETA · Dashboard Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/surat-style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar (sama seperti sebelumnya) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="asset/logoheader.png" alt="SIMPETA Logo" class="logo-image">
                    <div class="logo-text">
                    </div>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="user-profile">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                    <h4 id="displayName"></h4>
                    <p id="displayRole"></p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a></li>
                    <li><a href="surat-list.html"><i class="fas fa-table"></i><span>Data Surat</span></a></li>
                    <li><a href="surat-form.html?mode=request"><i class="fas fa-plus-circle"></i><span>Request Surat</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i><span>Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="page-title">
                    <h1>Dashboard Progress Surat</h1>
                    <p>Status dan perkembangan setiap permintaan surat</p>
                </div>
                <div class="top-actions">
                    <div class="date-display" id="currentDate"></div>
                </div>
            </header>

            <div class="content">
                <!-- Filter tabs or buttons -->
                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="all">Semua</button>
                    <button class="filter-btn" data-filter="requested">Requested</button>
                    <button class="filter-btn" data-filter="approved">Approved</button>
                    <button class="filter-btn" data-filter="rejected">Rejected</button>
                </div>

                <!-- Progress cards container -->
                <div id="progressContainer" class="progress-container">
                    <!-- Cards will be dynamically loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/surat-progress.js"></script>
</body>
</html>
