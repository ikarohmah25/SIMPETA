<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPETA · Manajemen Permintaan data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
               <div class="logo">
                 <img src="asset/logoheader.png" alt="SIMPETA Logo" class="logo-image">
                 <div class="logo-text">
                <h1>SIMPETA</h1>
                <p class="subtitle">Sistem Informasi Manajemen Permintaan Data</p>
                <p class="version">v1.0</p>
            </div>
            <div class="role-selector">
                <label for="roleSelect"><i class="fas fa-user-tag"></i> Login Sebagai</label>
                <select id="roleSelect" class="role-dropdown">
                    <option value="staff">Staff</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="manager">Manager</option>
                </select>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="input-field" placeholder="username" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="input-field" placeholder="password" autocomplete="off">
                </div>
                <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
            </form>
            <div id="statusMessage" class="status-message"></div>
            <div class="credential-info">
                <p><i class="fas fa-info-circle"></i> Kredensial:</p>
                <div class="credential-grid">
                    <div class="cred-item"><span class="role-badge staff">Staff</span> <code>staff / staff123</code></div>
                    <div class="cred-item"><span class="role-badge supervisor">Supervisor</span> <code>supervisor / sup456</code></div>
                    <div class="cred-item"><span class="role-badge manager">Manager</span> <code>manager / mgr789</code></div>
                </div>
                <p class="hint">💡 Double-click dropdown untuk auto-fill</p>
            </div>
            <div class="login-footer"><p>&copy; 2025 SIMPETA</p></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
